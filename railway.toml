# Railway deploy config — AInder production baseline
#
# Topology:
#   agent  → servers/agent       — OpenAI Agents SDK backend + cookie session auth bridge
#   ggui   → servers/ggui        — ggui MCP/render server
#   ainder → servers/mcps/todo   — AInder domain MCP server
#   web    → apps/web            — Vite SPA frontend
#
# This file is documentation + a deploy hint, not the sole source of truth.
# The real env contract is enforced by:
# - `scripts/validate-production-env.mjs`
# - `scripts/deploy-railway.mjs`

[build]
builder = "NIXPACKS"

[services.agent]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter ./servers/agent build"
startCommand = "pnpm --filter ./servers/agent start"

[services.agent.env]
PORT = "6791"
NODE_ENV = "production"
GGUI_MCP_URL = "http://${{ggui.RAILWAY_PRIVATE_DOMAIN}}:6781/mcp"
GGUI_AINDER_MCP_URL = "http://${{todo.RAILWAY_PRIVATE_DOMAIN}}:6782/mcp"
AINDER_ALLOWED_ORIGINS = "https://${{web.RAILWAY_PUBLIC_DOMAIN}}"
AINDER_SESSION_STORE_PATH = "/data/ainder-agent-sessions.json"
AINDER_SEED_DEMO = "false"
# Required secrets set in Railway dashboard:
# OPENAI_API_KEY=
# AINDER_SESSION_SECRET=
# AINDER_BOOTSTRAP_USER=
# AINDER_BOOTSTRAP_PASSWORD_HASH=

[services.ggui]
buildCommand = "pnpm install --frozen-lockfile"
startCommand = "pnpm --filter ./servers/ggui start"

[services.ggui.env]
PORT = "6781"
NODE_ENV = "production"
GGUI_PUBLIC_BASE_URL = "https://${{ggui.RAILWAY_PUBLIC_DOMAIN}}"
# Required secret set in Railway dashboard:
# OPENAI_API_KEY=

[services.todo]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter ./servers/mcps/todo build"
startCommand = "pnpm --filter ./servers/mcps/todo start"

[services.todo.env]
PORT = "6782"
NODE_ENV = "production"
AINDER_STORE_PATH = "/data/ainder-store.json"
AINDER_ADMIN_TOKEN = "set-in-railway"
AINDER_SEED_DEMO = "false"
AINDER_ALLOWED_ORIGINS = "https://${{web.RAILWAY_PUBLIC_DOMAIN}},https://${{agent.RAILWAY_PUBLIC_DOMAIN}}"
# Required secrets set in Railway dashboard:
# COCOUN_API_KEY=
# TOBL_API_KEY=

[services.web]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter ./apps/web build"
startCommand = "pnpm --filter ./apps/web preview --host 0.0.0.0 --port $PORT"

[services.web.env]
PORT = "6890"
VITE_AGENT_ENDPOINT_URL = "https://${{agent.RAILWAY_PUBLIC_DOMAIN}}"
